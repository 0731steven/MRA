services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mra}
      POSTGRES_USER: ${POSTGRES_USER:-mra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中配置 POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mra} -d ${POSTGRES_DB:-mra}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8101
      SECRET_KEY: ${SECRET_KEY:?请配置至少32个字符的 SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MOCK: ${DEEPSEEK_MOCK:-false}
      MINERU_TOKEN: ${MINERU_TOKEN:-}
      MINERU_BASE_URL: ${MINERU_BASE_URL:-https://mineru.net/api/v4}
      MINERU_MODEL: ${MINERU_MODEL:-vlm}
      MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-120}
      MINERU_USE_ENV_PROXY: ${MINERU_USE_ENV_PROXY:-false}
      TEACHER_REGISTRATION_CODE: ${TEACHER_REGISTRATION_CODE:-}
      BOOTSTRAP_TEACHER_USERNAME: ${BOOTSTRAP_TEACHER_USERNAME:-}
      BOOTSTRAP_TEACHER_PASSWORD: ${BOOTSTRAP_TEACHER_PASSWORD:-}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mra}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mra}
      QUESTION_BANK_PATH: /app/data/probability_questions.jsonl
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8101}:8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8101/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
