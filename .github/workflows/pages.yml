name: Deploy frontend preview to GitHub Pages

on:
  push:
    branches:
      - main
      - agent/github-pages-preview
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Build static preview
        working-directory: web
        env:
          VITE_STATIC_PREVIEW: "true"
        run: npm run build -- --base=/PSA/ --outDir=dist
      - name: Add SPA fallback
        run: cp web/dist/index.html web/dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
