name: Probability Tutor CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-sqlite:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      DEEPSEEK_MOCK: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: alembic check
      - run: pytest -q

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mra_test
          POSTGRES_USER: mra
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mra -d mra_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: production
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      DATABASE_URL: postgresql+asyncpg://mra:test-password@localhost:5432/mra_test
      DEEPSEEK_MOCK: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: alembic check
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run test:math
      - run: npm run test:ui
      - run: npm run build

  browser-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -r ../backend/requirements.txt
      - run: npm ci
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          E2E_PYTHON: python
      - run: npm run test:demo

  docker-compose-smoke:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
      POSTGRES_DB: mra_ci
      POSTGRES_USER: mra
      POSTGRES_PASSWORD: ci-database-password
      DEEPSEEK_MOCK: "true"
    steps:
      - uses: actions/checkout@v7
      - name: Build and start production stack
        run: docker compose -f backend/docker-compose.yml up --build -d
      - name: Wait for application readiness
        run: |
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8101/health/ready; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Show application logs on failure
        if: failure()
        run: docker compose -f backend/docker-compose.yml logs app
      - name: Stop test stack
        if: always()
        run: docker compose -f backend/docker-compose.yml down -v
